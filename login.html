<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/Styles.css">
</head>
<body>

<div class="contenedor">
    <div class="mitad-izquierdo"><h2>Iniciar Sesión</h2></div>

    <div class="mitad-derecho">
        <form id="loginForm">
            <div class="grid-formulario"> <div class="grupo">
            <label for="correo">Correo Electrónico:</label>
            <input type="text" id="correo" placeholder="ejemplo@gmail.com">
        </div>
        <div class="grupo">
            <label for="password" >Contraseña:</label>
            <input type="password" id="password" placeholder="contraseña" required>
        </div>
        <button type="button" onclick="iniciarSesion()">Entrar</button>
    </form></div>
       
    <br>
    <a href="index.html">Volver al Formulario</a>
</div></div>
    
    

<script src="js/utileria.js"></script>
<script>
    function iniciarSesion() {
        const correo = document.getElementById('correo').value;
        const password = document.getElementById('password').value;

        if (!Correo(correo)) {
            alert("Formato de correo no válido. Ejemplo: ejemplo@gmail.com");
            return;
        }

        if (!validarPassword(password)) {
            alert("La contraseña debe tener minimo de 8 caracteres entre numeros letras y simbolos");
            return;
        }

        alert("¡Credenciales válidas! Acceso concedido.");
    }
</script>

</body>
</html>
