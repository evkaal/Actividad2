<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
    <h2>Iniciar Sesión</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="correo">Correo Electrónico:</label>
            <input type="text" id="correo" required>
        </div>
        <div class="form-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" required>
        </div>
        <button type="button" onclick="iniciarSesion()">Entrar</button>
    </form>
    <br>
    <a href="index.html">Volver al Formulario</a>
</div>

<script src="js/utileria.js"></script>
<script>
    function iniciarSesion() {
        const correo = document.getElementById('correo').value;
        const password = document.getElementById('password').value;

        if (!Correo(correo)) {
            alert("Formato de correo no válido. Ejemplo: ejemplo@gmail.com");
            return;
        }

        if (!validarPassword(password)) {
            alert("La contraseña debe tener maximo de 6 números");
            return;
        }

        alert("¡Credenciales válidas! Acceso concedido.");
    }
</script>

</body>
</html>
